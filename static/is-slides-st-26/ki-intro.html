<li>die Konzepte des überwachten und unüberwachten Lernens voneinander abgrenzen.</li>
<li>die Funktionsweise von Entscheidungsbäumen und dem ID3-Algorithmus erklären und auf kleine Datensätze anwenden.</li>
<li>KI-Modelle anhand geeigneter Metriken (Confusion Matrix, Precision, Recall, F-Measure) bewerten und den Trade-off zwischen Precision und Recall analysieren.</li>

<h2 id="versuch-einer-definition">Versuch einer Definition</h2>
<blockquote>
<p>Intelligenz ist die Fähigkeit komplexe Probleme zu lösen.</p>
</blockquote>
<h2 id="eigenschaften-dieser-definition">Eigenschaften dieser Definition</h2>
<ul>
<li>Ein graduelles Maß dafür, ein bestimmtes Ziel zu erreichen.</li>
<li>Keine Annahme über
<ul>
<li>das Problemgebiet</li>
<li>das Vorgehen</li>
<li>zugrundeliegenden Mechanismen</li>
</ul>
</li>
</ul>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>

<h1 id="was-ist-k%C3%BCnstliche-intelligenz">Was ist künstliche Intelligenz?</h1>
<p>Legg und Hutter sammeln <strong>70</strong> mehr oder weniger abweichende Definitionen von (künstlicher) Intelligenz<sup id=cite3>[<a href="#ref3">3</a>]</sup></p>
<h2 id="definition">Definition</h2>
<blockquote>
<p>Intelligence measures an agent’s ability to achieve goals in a wide range of environments.<sup id=cite4>[<a href="#ref4">4</a>]</sup></p>
</blockquote>
<p><img src="./imgs/ai-agent-environment.png" alt="" style="width:400px;" /></p>

<h1 id="geschichte-der-ki">Geschichte der KI</h1>
<p>sehr kurz und unvollständig...</p>
<ol>
<li>1943 - McCulloch &amp; Pitts: Perceptron</li>
<li>1950 - Alan Turing: Turingtest</li>
<li>1956 - Dartmouth Workshop: Ursprung der KI-Forschung</li>
<li>1965 - ELIZA: erster Chatbot</li>
<li>1969 - Perzeptrons</li>
<li>1974 - 1985: KI Winter</li>
<li>1986 - Backpropagation Paper</li>
<li>1991 &amp; 1997: Hochreiter &amp; Schmidhuber: LSTM</li>
<li>1997 - Deep Blue</li>
<li>2024 - ChatGPT</li>
</ol>

<h1 id="schritt-f%C3%BCr-schritt-der-id3-algorithmus-24">Schritt-für-Schritt: der ID3-Algorithmus (2/4)</h1>
<p>Die Daten werden nun anhand des neuen Wurzelknotens in Teilmengen aufgeteilt.</p>
<ul>
<li>Ast &quot;Hoch&quot;: Alle 3 Kunden bekamen einen Kredit. Es wird ein Blatt mit Klasse <em>Ja</em> erstellt.</li>
<li>Ast &quot;Niedrig&quot;: Die Menge ist gemischt (1 Ja, 2 Nein). Die verbleibenden Attributen werden weiter aufgeteilt.</li>
</ul>

<h2 id="warum-reicht-die-accuracy-nicht-aus">Warum reicht die Accuracy nicht aus?</h2>
<ul>
<li>Angenommen, bei einer seltenen Krankheit sind 99% der Patienten gesund (Neg) und 1% krank (Pos).</li>
<li>Ein Modell, das einfach <em>immer</em> &quot;gesund (Neg)&quot; vorhersagt, hat eine Accuracy von <strong>99%</strong>!</li>
<li>Es ist aber komplett nutzlos, da es keinen einzigen kranken Patienten findet (0% Trefferquote bei POS).</li>
</ul>

<h1 id="evaluation-von-ki-modellen-precision-vs-recall-der-trade-off">Evaluation von KI-Modellen: Precision vs. Recall: Der Trade-off</h1>
<p>Precision und Recall lassen sich oft nur auf Kosten des jeweils anderen optimieren. Welcher Wert wichtiger ist, hängt vom Anwendungsfall ab.</p>
<h2 id="beispiel-1-spam-filter-fokus-auf-precision">Beispiel 1: Spam-Filter (Fokus auf Precision)</h2>
<ul>
<li><em>Ziel:</em> Keine echten Mails im Spam-Ordner (False Positives vermeiden!).</li>
<li><em>Folge:</em> Der Filter ist &quot;vorsichtig&quot;. Er sortiert nur Mails aus, bei denen er sich sehr sicher ist.</li>
<li><em>Ergebnis:</em> Hohe Precision, aber niedriger Recall (einige Spam-Mails rutschen durch).</li>
</ul>
<h2 id="beispiel-2-krebs-screening-fokus-auf-recall">Beispiel 2: Krebs-Screening (Fokus auf Recall)</h2>
<ul>
<li><em>Ziel:</em> Keinen kranken Patienten übersehen (False Negatives vermeiden!).</li>
<li><em>Folge:</em> Das Modell schlägt bei der kleinsten Auffälligkeit Alarm.</li>
<li><em>Ergebnis:</em> Hoher Recall (alle Kranken gefunden), aber niedrige Precision (viele gesunde Patienten müssen zur Nachuntersuchung).</li>
</ul>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>

<h2 id="szenario-b-%C3%BCbervorsichtiges-modell-fokus-recall">Szenario B: &quot;Übervorsichtiges&quot; Modell (Fokus Recall)</h2>
<p>Sagt bei geringstem Verdacht &quot;krank&quot; (Pos) voraus.</p>
