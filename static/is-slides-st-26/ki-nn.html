<header>Neuronale Netze</header>
<h1 id="lernziele">Lernziele</h1>
<p>Nach dieser Vorlesung können Sie...</p>
<ul>
<li>den Aufbau und die Funktionsweise eines künstlichen Neurons (Perzeptron) mathematisch und konzeptionell erklären.</li>
<li>die Grenzen eines einzelnen Perzeptrons (z.B. am XOR-Problem) aufzeigen und die Notwendigkeit von Multi-Layer Perzeptrons (MLP) begründen.</li>
<li>die Architektur eines künstlichen neuronalen Netzes (Input, Hidden und Output Layer) beschreiben.</li>
<li>den grundlegenden Lernprozess (Backpropagation) und die Rolle der Fehlerfunktion (Loss Function) erläutern.</li>
</ul>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>

<header>Neuronale Netze</header>

<h1 id="multi-layer-perzeptron">Multi-Layer Perzeptron</h1>
<p>Ein einzelnes Perzeptron fungiert als <strong>linearer Klassifikator</strong>.</p>
<ul>
<li>Es kann nur Probleme lösen, bei denen die Klassen durch eine Gerade (2D) oder Hyperebene (nD) voneinander getrennt werden können.</li>
<li>Die Entweder-Oder Funktion (XOR) kann mit einem Perzeptron nicht dargestellt werden!</li>
</ul>
<br />
<p>Lösung</p>
<ul>
<li>Durch das Hintereinanderschalten von Neuronen können komplexere Probleme gelöst werden.</li>
</ul>

<header>Neuronale Netze</header>

<h1 id="neuronale-netze-1">Neuronale Netze</h1>
<p>Ein Multi-Layer Perzeptron (MLP) mit einer <strong>Vielzahl</strong> von künstlichen Neuronen, die in <strong>mehreren Schichten</strong> organisiert sind, bezeichnet man als (künstliches) Neuronales Netz (KNN / ANN).</p>
<p>Die grundlegende Architektur besteht aus drei Arten von Schichten (Layers):</p>
<ul>
<li>Input Layer (Eingabeschicht)</li>
<li>Hidden Layer(s) (Verborgene Schichten)</li>
<li>Output Layer (Ausgabeschicht)</li>
</ul>
<p><img src="./imgs/neural-network.drawio.png" alt="" style="width:550px;" /></p>

<h1 id="lernprozess-gewichte-anpassen">Lernprozess: Gewichte anpassen</h1>
<p>Damit das KNN korrekte Vorhersage machen kann, müssen die richtigen Werte für verschiedenen Matrizen <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.016ex;" xmlns="http://www.w3.org/2000/svg" width="2.69ex" height="1.568ex" role="img" focusable="false" viewBox="0 -686 1189 693"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="TeXAtom" data-mjx-texclass="ORD"><g data-mml-node="mi"><path data-c="1D416" d="M915 686L1052 683Q1142 683 1157 686H1164V624H1073L957 320Q930 249 900 170T855 52T839 10Q834 0 826 -5Q821 -7 799 -7H792Q777 -7 772 -5T759 10Q759 11 748 39T716 122T676 228L594 442L512 228Q486 159 455 78Q433 19 428 9T416 -5Q411 -7 389 -7H379Q356 -7 349 10Q349 12 334 51T288 170T231 320L116 624H24V686H35Q44 683 183 683Q331 683 355 686H368V624H323Q278 624 278 623L437 207L499 369L561 531L526 624H434V686H445Q454 683 593 683Q741 683 765 686H778V624H733Q688 624 688 623L847 207Q848 207 927 415T1006 624H905V686H915Z"></path></g></g></g></g></svg></mjx-container> gefunden werden.</p>
<h2 id="vorgehen-backpropagation">Vorgehen (Backpropagation)</h2>
<ol start="0">
<li><strong>Initialisierung:</strong> Gewichte werden mit zufälligen Werten initialisiert.<br />
<br /></li>
<li><strong>Forward Propagation:</strong> Mit aktuellen Gewichten wird für Trainingsdaten eine Vorhersage berechnet.</li>
<li><strong>Fehler-Berechnung:</strong> Berechnung der Abweichung der Vorhersage vom tatsächlichem Label.</li>
<li><strong>Update:</strong> Anpassung der Gewichte damit Vorhersage sich dem tatsächlichen Label annähert.</li>
<li>Wiederholung der Schritte 1 -3 bis Abbruchkriterium erreicht ist.</li>
</ol>
<blockquote>
<p>Ziel: Minimierung der Fehlerfunktion (Loss Function).</p>
</blockquote>

<h1 id="der-einfluss-der-lernrate">Der Einfluss der Lernrate (<mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.489ex;" xmlns="http://www.w3.org/2000/svg" width="1.124ex" height="1.489ex" role="img" focusable="false" viewBox="0 -442 497 658"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D702" d="M21 287Q22 290 23 295T28 317T38 348T53 381T73 411T99 433T132 442Q156 442 175 435T205 417T221 395T229 376L231 369Q231 367 232 367L243 378Q304 442 382 442Q436 442 469 415T503 336V326Q503 302 439 53Q381 -182 377 -189Q364 -216 332 -216Q319 -216 310 -208T299 -186Q299 -177 358 57L420 307Q423 322 423 345Q423 404 379 404H374Q288 404 229 303L222 291L189 157Q156 26 151 16Q138 -11 108 -11Q95 -11 87 -5T76 7T74 17Q74 30 114 189T154 366Q154 405 128 405Q107 405 92 377T68 316T57 280Q55 278 41 278H27Q21 284 21 287Z"></path></g></g></g></svg></mjx-container>)</h1>
<p>Die Lernrate <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.489ex;" xmlns="http://www.w3.org/2000/svg" width="1.124ex" height="1.489ex" role="img" focusable="false" viewBox="0 -442 497 658"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D702" d="M21 287Q22 290 23 295T28 317T38 348T53 381T73 411T99 433T132 442Q156 442 175 435T205 417T221 395T229 376L231 369Q231 367 232 367L243 378Q304 442 382 442Q436 442 469 415T503 336V326Q503 302 439 53Q381 -182 377 -189Q364 -216 332 -216Q319 -216 310 -208T299 -186Q299 -177 358 57L420 307Q423 322 423 345Q423 404 379 404H374Q288 404 229 303L222 291L189 157Q156 26 151 16Q138 -11 108 -11Q95 -11 87 -5T76 7T74 17Q74 30 114 189T154 366Q154 405 128 405Q107 405 92 377T68 316T57 280Q55 278 41 278H27Q21 284 21 287Z"></path></g></g></g></svg></mjx-container> ist ein zentraler Parameter, der die Schrittweite der Gewichtsadaption pro Iteration des Gradientenabstiegs skaliert.</p>
<ul>
<li>Zu geringe Lernrate:
<ul>
<li>Führt zu langsamer Konvergenz (hoher Rechenaufwand)</li>
<li>Erhöht das Risiko, in suboptimalen lokalen Minima zu verharren</li>
</ul>
</li>
<li>Zu hohe Lernrate:
<ul>
<li>Verursacht instabiles Verhalten (Oszillationen) um das Minimum herum</li>
<li>führt zur Divergenz (Zunahme des Fehlers), da das Minimum übersprungen wird.</li>
</ul>
</li>
</ul>

<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>

<h1 id="ausblick--demo-komplexere-architekturen">Ausblick &amp; Demo: Komplexere Architekturen</h1>
<p>Neuronale Netze können weitaus komplexere Strukturen annehmen als die einfachen gezeigten KNN. Ein prominentes Beispiel hierfür sind <strong>Autoencoder</strong>.</p>
<ul>
<li><strong>Encoder:</strong> Komprimiert hochdimensionale Eingabedaten (z. B. Bilder) auf die wesentlichen Merkmale in eine kompakte Repräsentation (den <em>latenten Raum</em>).</li>
<li><strong>Decoder:</strong> Rekonstruiert aus dieser komprimierten Repräsentation wieder die ursprünglichen Daten.</li>
</ul>
<p><img src="./imgs/autoencoder-demo.png" alt="" style="width:450px;" /></p>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
