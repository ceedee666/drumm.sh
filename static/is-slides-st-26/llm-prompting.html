<h1 id="generatives-knn-autoencoder">Generatives KNN: Autoencoder</h1>
<h2 id="definition">Definition</h2>
<blockquote>
<p>Ein Autoencoder ist ein <strong>künstliches neuronales Netz</strong>, das dazu genutzt wird, effiziente Codierungen zu lernen. Das Ziel eines Autoencoders ist es, eine <strong>komprimierte Repräsentation (Encoding)</strong> für einen Satz Daten zu lernen und somit auch wesentliche Merkmale zu extrahieren. (Wikipedia)</p>
</blockquote>
<h2 id="aufbau">Aufbau</h2>
<p>Ein Autoencoder besteht aus zwei Teilen:</p>
<ul>
<li>Ein Encoder-Netzwerk, das hochdimensionale Eingabedaten, in einen niedrigdimensionalen Repräsentation (Latent Space) komprimiert</li>
<li>Ein Decoder-Netzwerk, das einen gegebenen niedrigdimensionale Repräsentation wieder in den ursprünglichen Bereich dekomprimiert</li>
</ul>
<p><img src="./imgs/autoencoder-architecture.png" alt="" style="width:550px;" /></p>
<p>Quelle: [<a href="#ref1">1</a>]</p>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="8" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="9" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>
<h1 id="autoencoder-grenzen--fallstricke">Autoencoder: Grenzen &amp; Fallstricke</h1>
<h2 id="problem-1-overfitting">Problem 1: Overfitting</h2>
<ul>
<li>Ist der kompression zu groß, lernt das Netz keine Konzepte, sondern lernt genau die Trainingsdaten.</li>
</ul>
<h2 id="problem-2-l%C3%BCcken">Problem 2: Lücken</h2>
<ul>
<li>Klassische Autoencoder weisen jedem Bild einen festen Punkt zu. Zwischen den Produktclustern ist oft &quot;leerer Raum&quot;. Wählt man dort einen Punkt zur Generierung, erzeugt der Dekoder nur unbrauchbares Rauschen.</li>
<li><em>Variational Autoencoders (VAEs)</em> erzwingen eine stetige Wahrscheinlichkeitsverteilung im Latent Space – der notwendige Schritt zu <em>echter</em> generativer KI</li>
</ul>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>
<h1 id="von-bildern-zu-text-warum-sprache-anders-ist">Von Bildern zu Text: Warum Sprache anders ist</h1>
<p>Bisher haben wir gesehen, wie komprimierte Repräsentationen Bilder generieren. Text hat jedoch eine besondere Eigenschaft: Er ist <strong>streng sequentiell</strong> und extrem <strong>kontextabhängig</strong>.</p>
<ul>
<li>Ein Wort hat selten eine feste Bedeutung ohne seinen Kontext.</li>
<li><em>Beispiel:</em>
<ul>
<li>&quot;Der Kunde sitzt auf der <strong>Bank</strong>.&quot;</li>
<li>&quot;Der Kunde zahlt Geld auf der <strong>Bank</strong> ein.&quot;</li>
</ul>
</li>
</ul>
<p>Der technologische Durchbruch zur Lösung dieses Problems erfolgte 2017 durch die <strong>Transformer-Architektur</strong>.</p>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>
<h1 id="transformer-architektur-definition--konzept">Transformer-Architektur: Definition &amp; Konzept</h1>
<blockquote>
<p>Ein <strong>Transformer</strong> ist eine Netzwerk-Architektur, die speziell darauf ausgelegt ist, langreichweitige Abhängigkeiten in Texten effizient zu erfassen.<sup>[<a href="#ref2">2</a>]</sup></p>
</blockquote>
<ul>
<li>Vorgestellt im Google-Paper <em>&quot;Attention Is All You Need&quot;</em> (2017)<sup>[<a href="#ref2">2</a>]</sup>.</li>
<li>Kernaufgabe
<ul>
<li>&quot;Next Token Prediction&quot;</li>
<li>Generative Modelle (wie GPT = Generative Pre-trained Transformer) berechnen Wahrscheinlichkeiten für das exakt nächste Wortstück (Token), basierend auf dem bisherigen Text.</li>
</ul>
</li>
<li>Der Paradigmenwechsel:<br />
Weg von streng sequentiellen Analysen hin zur parallelen Betrachtung des gesamten Textes.</li>
</ul>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="12" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>
<h1 id="transformer-architektur-funktionsweise-self-attention">Transformer-Architektur: Funktionsweise (Self-Attention)</h1>
<p>Das Herzstück ist der <strong>Self-Attention-Mechanismus</strong>. Anstatt Wörter isoliert zu betrachten, lernt das Modell, wie stark jedes Wort im Satz mit jedem anderen Wort zusammenhängt.</p>
<p><img src="./imgs/attention-example.png" alt="" style="width:500px;" /></p>
<p><em>Intuition:</em> Wenn das Modell das Wort &quot;Bank&quot; verarbeitet, richtet es seine &quot;Aufmerksamkeit&quot; (Attention) stark auf das Wort &quot;sitzt&quot;</p>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-class="columns" data-theme="my-theme" lang="en-US" class="columns" data-marpit-pagination="13" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--class:columns;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>

<h1 id="transformer-architektur-aufbau">Transformer-Architektur: Aufbau</h1>
<ul>
<li>Encoder-Decoder-Struktur</li>
<li>Auto-regressive: zuvor generierten werden Symbole als zusätzliche Eingabe bei der Generierung der nächsten verwendet</li>
</ul>
<p><img src="./imgs/transformer-architecture.png" alt="" style="width:350px;" /></p>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="14" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>
<h1 id="transformer-architektur-grenzen--fallstricke">Transformer-Architektur: Grenzen &amp; Fallstricke</h1>
<p>Die technische Funktionsweise (Wahrscheinlichkeiten statt Datenbanken) führt zu bekannten Risiken:</p>
<ol>
<li><strong>Halluzinationen:</strong> Das Modell liefert immer das <em>wahrscheinlichste</em> nächste Wort, nicht zwingend das <em>faktisch korrekte</em>.</li>
<li><strong>Kosten &amp; Kontextfenster:</strong> Die Berechnung der Attention-Gewichte zwischen <em>allen</em> Wörtern wird exponentiell teurer, je länger das Dokument ist.</li>
<li><strong>Blackbox:</strong> Welche Gewichte genau dazu führen, dass ein Modell eine bestimmte Empfehlung gibt, ist nicht nachvollziehbar.</li>
<li><strong>Ethik &amp; Trainingsdaten:</strong> Modelle werden auf urheberrechtlich geschützten Daten trainiert.</li>
</ol>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-class="dense" data-theme="my-theme" lang="en-US" class="dense" data-marpit-pagination="15" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--class:dense;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>

<h1 id="prompting">Prompting</h1>
<p>Nachdem wir wissen, dass Modelle das &quot;wahrscheinlichste nächste Wort&quot; vorhersagen: Wie bringen wir sie dazu, <em>nützliche</em> Dinge zu tun?</p>
<ul>
<li><strong>Der Prompt</strong> ist unser Eingabetext. Er gibt den <em>Kontext</em> vor, aus dem das Modell die nächsten Wörter ableitet.</li>
<li>Prompting ist <strong>keine Programmierung</strong>, sondern eine (weiche) Spezifikation.</li>
</ul>
<h2 id="vorgehensweisen">Vorgehensweisen</h2>
<p>Im &quot;The Prompt Report&quot; Paper <sup>[<a href="#ref3">3</a>]</sup> wird systematisch untersucht, welche Vorgehensweisen existieren.</p>
<ul>
<li>Erfolgreich sind vor allem Techniken, die <strong>Kontext strukturieren</strong>, <strong>Beispiele geben</strong> und <strong>Gedankengänge erzwingen</strong>.</li>
</ul>
<h2 id="prompting-vs-prompt-engineering">Prompting vs. Prompt Engineering</h2>
<ul>
<li><strong>Prompting:</strong> Die bloße Eingabe von Text.</li>
<li><strong>Prompt Engineering:</strong> Ein systematischer, iterativer Prozess zur methodischen Gestaltung und Optimierung von Eingaben für reproduzierbare Ergebnisse.</li>
</ul>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="16" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>
<h1 id="architektur-eines-modernen-llm-systems">Architektur eines modernen LLM-Systems</h1>
<p>Ein modernes ChatGPT oder Copilot ist <strong>nicht</strong> nur das nackte LLM. Es ist ein System aus mehreren Schichten, z.B.:</p>
<ul>
<li>System Prompt:
<ul>
<li>Die globale Anweisung an das Modell (z.B. Rolle, Tonalität, strenge Regeln).</li>
<li>Kann über API übergeben werden, um das Verhalten für die gesamte Session zu &quot;programmieren&quot;.</li>
</ul>
</li>
<li>User Prompt: Ihre eigentliche Eingabe.</li>
<li>Guardrails: Vor- und nachgelagerte Filter, die unabhängig vom Modell agieren (blockieren z.B. Hassrede oder filtern Firmengeheimnisse).</li>
<li>Das LLM: Generiert Ausbage auf Basis der Eingaben.</li>
</ul>
<p><strong>Wichtig:</strong> Viele der Fortschritte der Chatbots basieren nicht auf besseren Modell sondern den verfügbaren Werkzeugen und Schnittstellen.</p>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>
<h1 id="exkurs-system-prompt-leaks">Exkurs: &quot;System Prompt Leaks&quot;</h1>
<p>Obwohl System Prompts verborgen sein sollen, gelingt es Nutzern (durch Tricks oder &quot;Jailbreaks&quot;) regelmäßig, diese aus Chatbots auszulesen.</p>
<ul>
<li>
<p>Was wir daraus lernen: Wir sehen exakt, wie Firmen wie OpenAI oder Anthropic ihre Modelle instruieren (Tools, Tonalität, verbotene Themen).</p>
</li>
<li>
<p>Beispiel: Gemini 3.1 pro</p>
<blockquote>
<p>You are Gemini. You are a helpful assistant. Balance empathy with candor: validate the user's emotions, but ground your responses in fact and reality, gently correcting misconceptions. Mirror the user's tone, formality, energy, and humor. Provide clear, insightful, and straightforward answers. Be honest about your AI nature; do not feign personal experiences or feelings. (Quelle: <a href="https://github.com/asgeirtj/system_prompts_leaks">https://github.com/asgeirtj/system_prompts_leaks</a>)</p>
</blockquote>
</li>
</ul>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="18" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>
<h1 id="der-aufbau-eines-guten-prompts">Der Aufbau eines guten Prompts</h1>
<p>Eine strukturierte Methode für den Aufbau eines guten Prompts ist der <strong>&quot;Role-Context-Task&quot;</strong> Framework (oft ergänzt um <em>Format</em> und <em>Constraints</em>).</p>
<ol>
<li><strong>Role (Rolle):</strong> &quot;Du bist ein erfahrener Supply Chain Manager.&quot;</li>
<li><strong>Context (Kontext):</strong> &quot;Die Lieferung ist 3 Wochen zu spät, es droht ein Produktionsstopp.&quot;</li>
<li><strong>Task (Aufgabe):</strong> &quot;Schreibe eine E-Mail an den Lieferanten zur Eskalation.&quot;</li>
</ol>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="19" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>
<h1 id="technik-1-few-shot-prompting">Technik 1: Few-Shot Prompting</h1>
<h2 id="konzept">Konzept</h2>
<p>Wir geben dem Modell <em>im Prompt</em> 2-3 konkrete Beispiele (Input <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> Output) mit, bevor es die eigentliche Aufgabe löst.</p>
<ul>
<li><em>Referenz:</em> Beschrieben im Paper <em>&quot;Language Models are Few-Shot Learners&quot;</em> <sup>[<a href="#ref4">4</a>]</sup>.</li>
<li><em>Nutzen:</em> Das Modell &quot;lernt&quot; Muster und Output-Formate sofort.</li>
</ul>
<h2 id="beispiel-rtc-basiert">Beispiel (RTC basiert)</h2>
<blockquote>
<p><strong>Rolle:</strong> Du bist Controller.<br />
<strong>Kontext:</strong> Wir kategorisieren Spesen nach Kostenstelle.<br />
<strong>Task:</strong> Klassifiziere folgende Spesen.<br />
<em>Beispiel 1:</em> &quot;Taxi zum Flughafen&quot; <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> Reisekosten<br />
<em>Beispiel 2:</em> &quot;Mittagessen mit Kunde&quot; <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> Bewirtung<br />
<em>Aufgabe:</em> &quot;Hotel in Berlin&quot; <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container></p>
</blockquote>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-class="dense" data-theme="my-theme" lang="en-US" class="dense" data-marpit-pagination="20" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--class:dense;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>

<h1 id="%C3%BCbung-few-shot-prompting">Übung: Few-Shot Prompting</h1>
<h2 id="szenario">Szenario</h2>
<p>Sie sollen Kundenfeedback in die Kategorien Technik, Preis, Bedienung, Sonstiges klassifizieren und die Stimmung des Feedbacks bewerten. Die Antwort soll im JSON-Format erfolgen.</p>
<ul>
<li>Beispiel 1:
<ul>
<li>Eingabe: &quot;Die App lädt seit dem Update ewig.&quot;</li>
<li>Ausgabe: {&quot;kategorie&quot;: &quot;Technik&quot;, &quot;sentiment&quot;: &quot;negativ&quot;}</li>
</ul>
</li>
<li>Beispiel 2:
<ul>
<li>Input: &quot;Das neue Abo-Modell ist für den Funktionsumfang echt fair.&quot;</li>
<li>Output: {&quot;kategorie&quot;: &quot;Preis&quot;, &quot;sentiment&quot;: &quot;positiv&quot;}</li>
</ul>
</li>
<li>Beispiel 3:
<ul>
<li>Input: &quot;Ich finde den Button zum Speichern einfach nicht.&quot;</li>
<li>Output: {&quot;kategorie&quot;: &quot;Bedienung&quot;, &quot;sentiment&quot;: &quot;neutral&quot;}</li>
</ul>
</li>
</ul>
<h2 id="%C3%BCbung-5-min">Übung (5 Min)</h2>
<ol>
<li>Erstellen Sie einen Zero-Shot Prompt (ohne Beispiele).</li>
<li>Erstellen Sie einen Few-Shot Prompt nach dem gezeigten Template mit 3 Beispielen.</li>
<li>Testen Sie verschiedene Eingaben und vergleichen Sie welche Variante sich wie verhält.</li>
</ol>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="21" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>
<h1 id="technik-2-chain-of-thought-cot">Technik 2: Chain of Thought (CoT)</h1>
<h2 id="konzept-1">Konzept</h2>
<p>Statt direkt nach der Antwort zu fragen, fordern wir das Modell auf, <strong>Schritt für Schritt</strong> zu denken.</p>
<p>-Da LLMs nicht &quot;vorausplanen&quot; können, generieren sie durch das Aufschreiben der Gedankengänge einen eigenen Kontex</p>
<h2 id="template-rtc-basiert">Template (RTC basiert)</h2>
<blockquote>
<p>Rolle:...<br />
Kontext:...<br />
Task:...</p>
<p><strong>Denke Schritt für Schritt. Gib alles Zwischenschritte aus.</strong></p>
</blockquote>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="22" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>
<h1 id="%C3%BCbung-chain-of-thought">Übung: Chain of Thought</h1>
<h2 id="%C3%BCbung-5-min-1">Übung (5 min)</h2>
<p>Versuchen Sie die folgenden Fragen mit einem LLM zu lösen.</p>
<ul>
<li>
<p>Löse <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.186ex;" xmlns="http://www.w3.org/2000/svg" width="15.518ex" height="2.072ex" role="img" focusable="false" viewBox="0 -833.9 6859 915.9"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="msup"><g data-mml-node="mi"><path data-c="1D465" d="M52 289Q59 331 106 386T222 442Q257 442 286 424T329 379Q371 442 430 442Q467 442 494 420T522 361Q522 332 508 314T481 292T458 288Q439 288 427 299T415 328Q415 374 465 391Q454 404 425 404Q412 404 406 402Q368 386 350 336Q290 115 290 78Q290 50 306 38T341 26Q378 26 414 59T463 140Q466 150 469 151T485 153H489Q504 153 504 145Q504 144 502 134Q486 77 440 33T333 -11Q263 -11 227 52Q186 -10 133 -10H127Q78 -10 57 16T35 71Q35 103 54 123T99 143Q142 143 142 101Q142 81 130 66T107 46T94 41L91 40Q91 39 97 36T113 29T132 26Q168 26 194 71Q203 87 217 139T245 247T261 313Q266 340 266 352Q266 380 251 392T217 404Q177 404 142 372T93 290Q91 281 88 280T72 278H58Q52 284 52 289Z"></path></g><g data-mml-node="mn" transform="translate(605,363) scale(0.707)"><path data-c="32" d="M109 429Q82 429 66 447T50 491Q50 562 103 614T235 666Q326 666 387 610T449 465Q449 422 429 383T381 315T301 241Q265 210 201 149L142 93L218 92Q375 92 385 97Q392 99 409 186V189H449V186Q448 183 436 95T421 3V0H50V19V31Q50 38 56 46T86 81Q115 113 136 137Q145 147 170 174T204 211T233 244T261 278T284 308T305 340T320 369T333 401T340 431T343 464Q343 527 309 573T212 619Q179 619 154 602T119 569T109 550Q109 549 114 549Q132 549 151 535T170 489Q170 464 154 447T109 429Z"></path></g></g><g data-mml-node="mo" transform="translate(1230.8,0)"><path data-c="2212" d="M84 237T84 250T98 270H679Q694 262 694 250T679 230H98Q84 237 84 250Z"></path></g><g data-mml-node="mn" transform="translate(2231,0)"><path data-c="35" d="M164 157Q164 133 148 117T109 101H102Q148 22 224 22Q294 22 326 82Q345 115 345 210Q345 313 318 349Q292 382 260 382H254Q176 382 136 314Q132 307 129 306T114 </li>
<li>
<p>Ich bin zum Markt gegangen und habe 10 Äpfel gekauft. Ich habe dem Nachbarn zwei Äpfel und dem Handwerker ebenfalls zwei Äpfel gegeben. Dann habe ich noch 5 Äpfel gekauft und 1 davon gegessen. Wie viele Äpfel hatte ich noch übrig?</p>
</li>
</ul>
<p>Was stellen Sie fest? Hilft der Chain-of-Thought-Ansatz?</p>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="23" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>
<h1 id="technik-3-tree-of-thought-tot">Technik 3: Tree of Thought (ToT)</h1>
<h2 id="konzept-2">Konzept</h2>
<p>Wenn ein Problem sehr komplex ist (z.B. Strategie), lassen wir das Modell erst <em>mehrere</em> Lösungswege entwerfen, bewerten und sich dann für den besten entscheiden.</p>
<h2 id="beispiel-rtc-basiert-1">Beispiel (RTC basiert)</h2>
<blockquote>
<p><strong>Rolle:</strong> Du bist Chief Marketing Officer.<br />
<strong>Kontext:</strong> Produkteinführung bei begrenztem Budget (50.000€).<br />
<strong>Task:</strong> Entwickle die beste Kampagnen-Strategie.</p>
<ul>
<li><em>Schritt 1:</em> Entwirf drei komplett unterschiedliche Strategie-Ansätze.</li>
<li><em>Schritt 2:</em> Bewerte jeden Ansatz kritisch (Pros/Cons).</li>
<li><em>Schritt 3:</em> Wähle basierend darauf den besten Ansatz aus und formuliere den Plan.</li>
</ul>
</blockquote>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="24" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>
<h1 id="%C3%BCbung-tree-of-thought">Übung: Tree of Thought</h1>
<h2 id="szenario-1">Szenario</h2>
<p>Pricing-Strategie für ein neues Software-Produkt (SaaS).</p>
<h2 id="%C3%BCbung-5-min-2">Übung (5 Min)</h2>
<p>Nutzen Sie das ToT-Template, um das LLM verschiedene Preismodelle (Freemium, Pay-per-Use, Flatrate) entwerfen und evaluieren zu lassen.</p>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>
<h1 id="technik-4-r%C3%BCckfragen-erzwingen">Technik 4: Rückfragen erzwingen</h1>
<h2 id="konzept-3">Konzept</h2>
<p>LLMs tendieren dazu, sich Antworten auszudenken (Halluzination), wenn Kontext fehlt. Wir können dieses Verhalten per Prompt umdrehen.</p>
<h2 id="beispiel-rtc-basiert-2">Beispiel (RTC basiert)</h2>
<blockquote>
<p><strong>Kontext:</strong> Ich möchte ein neues CRM-System einführen.<br />
<strong>Task:</strong> Hilf mir bei der Anforderungsanalyse.<br />
<em>Regel:</em> Du darfst noch KEINE Lösung vorschlagen. Stelle mir stattdessen genau die 3 wichtigsten Rückfragen (nacheinander), um meine Situation zu verstehen.</p>
</blockquote>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="26" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>
<h1 id="%C3%BCbung-r%C3%BCckfragen-erzwingen">Übung: Rückfragen erzwingen</h1>
<h2 id="szenario-2">Szenario</h2>
<p>Requirements Engineering / Anforderungsaufnahme.</p>
<h2 id="%C3%BCbung-5-min-3">Übung (5 Min)</h2>
<p>Bitten Sie ein LLM, einen Prozess für &quot;Onboarding neuer Mitarbeiter&quot; zu entwerfen.</p>
<ul>
<li><strong>Variante 1:</strong> &quot;Schreibe einen Onboarding-Prozess.&quot;</li>
<li><strong>Variante 2:</strong> Nutzen Sie das Template und befehlen Sie dem Modell, zuerst Fragen zu Firmenkultur, IT-Ausstattung und Dauer zu stellen.</li>
</ul>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="27" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>
<h1 id="meta-prompting-llms-f%C3%BCr-prompt-engineering-nutzen">Meta-Prompting: LLMs für Prompt Engineering nutzen</h1>
<p>Warum den Prompt komplett selbst schreiben, wenn Sie dafür ein LLM nutzen können?</p>
<p><strong>Meta-Prompting</strong> bedeutet, dass wir ein LLM bitten, einen optimierten Prompt für uns zu generieren.</p>
<h2 id="beispiel-prompt-f%C3%BCr-meta-prompting">Beispiel-Prompt für Meta-Prompting</h2>
<blockquote>
<p>Ich brauche Prompt zur Korrektur meiner Hausarbeit. Der Prüfer soll eine strenger BWL-Professor sein. Er soll die Hausarbeit:</p>
<ul>
<li>Anhand etablierter BWL-Theorien prüfen</li>
<li>Rechenwege prüfen</li>
<li>Aufbau, Methodik, Quellenangaben und Argumentationslogik beurteilen</li>
<li>Konkrete Verbesserungsvorschläge geben.</li>
</ul>
</blockquote>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="28" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>
<h1 id="strukturierung-via-informationpromots-mit-markdown">Strukturierung via Information/Promots mit Markdown</h1>
<p>Was ist das Problem mit allen gezeigten Ansätzen?</p>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="29" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>
<h1 id="strukturierung-via-informationpromots-mit-markdown-1">Strukturierung via Information/Promots mit Markdown</h1>
<h2 id="l%C3%B6sungsansatz">Lösungsansatz</h2>
<ul>
<li>Speichern Sie umfangreichen Kontext und Regeln in Markdown-Dateien (<code>.md</code>).</li>
<li>Nutzen Sie Überschriften <code>#</code> und Listen <code>-</code> um dem LLM die Struktur der Informationen</li>
<li>Verwenden sie Links um auf andere Dokumente zu verweisen.</li>
<li>Strukturieren Sie die Informationen hierarchisch</li>
</ul>
<h2 id="beispiel">Beispiel</h2>
<pre><code class="language-text">Allgemein
├─ rolle.md
├─ regeln.md
├─ promt-templates.md
├─ Projekt 1
│  ├─ projektdetails.md

</code></pre>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-header="LLMs &amp; Prompting" data-footer="Prof. Dr. Christian Drumm - FH Aachen" data-theme="my-theme" lang="en-US" data-marpit-pagination="30" style="--paginate:true;--header:LLMs &amp; Prompting;--footer:Prof. Dr. Christian Drumm - FH Aachen;--theme:my-theme;" data-marpit-pagination-total="31">
<header>LLMs &amp; Prompting</header>
<h1 id="limitationen-des-promptings-architekturbedingt">Limitationen des Promptings (Architekturbedingt)</h1>
<p>Prompting und Prompt-Engineering hat harte Grenzen, die in der Transformer-Architektur liegen:</p>
<ol>
<li><strong>Kontext-Fenster:</strong> Ist der Prompt zu lang, &quot;vergisst&quot; die Attention-Mechanik oft Informationen in der Mitte des Textes (&quot;Lost in the Middle&quot;-Phänomen).</li>
<li><strong>Keine echten Updates:</strong> Ein Prompt ändert <em>nicht</em> das angelernte Wissen (die Gewichte) des Modells. Sobald der Chat-Verlauf gelöscht wird, ist alles vergessen.</li>
<li><strong>Mangelnde Rechenfähigkeit:</strong> Transformer sind Sprachkalkulatoren, keine Taschenrechner. Für komplexe Mathematik helfen Prompts nicht – hier braucht man Tool-Nutzung (z.B. Python-Interpreter).</li>
</ol>
<footer>Prof. Dr. Christian Drumm - FH Aachen</footer>
</section>
